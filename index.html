<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlashLearn - Học Tiếng Anh</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f4ff; }
    .card-container { perspective: 1200px; }
    .card-inner {
      position: relative; width: 100%; height: 100%;
      transition: transform 0.55s cubic-bezier(.4,0,.2,1);
      transform-style: preserve-3d;
    }
    .card-inner.flipped { transform: rotateY(180deg); }
    .card-face {
      position: absolute; width: 100%; height: 100%;
      backface-visibility: hidden; -webkit-backface-visibility: hidden;
      border-radius: 24px;
    }
    .card-back-face { transform: rotateY(180deg); }
    @keyframes pulse-ring {
      0%   { transform: scale(1);    opacity: 1; }
      100% { transform: scale(1.6);  opacity: 0; }
    }
    .speak-active::after {
      content: ''; position: absolute; inset: 0;
      border-radius: 9999px; border: 2px solid #3b82f6;
      animation: pulse-ring .7s ease-out infinite;
    }
    .progress-fill { transition: width .35s ease; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
    .shake { animation: shake .3s ease; }
    @keyframes popIn { 0%{transform:scale(.85);opacity:0} 100%{transform:scale(1);opacity:1} }
    .pop-in { animation: popIn .25s cubic-bezier(.34,1.56,.64,1) both; }
    .pill { display:inline-flex; align-items:center; padding:2px 8px; border-radius:999px; font-size:11px; font-weight:600; }
  </style>
</head>
<body>
  
  <div id="root"></div>

  <script type="text/babel" src="./ui.js"></script>
  <script type="text/babel" src="./srs.js"></script>
  <script type="text/babel" src="./auth.js"></script>
  <script type="text/babel" src="./home.js"></script>
  <script type="text/babel" src="./detail.js"></script>
  <script type="text/babel" src="./study.js"></script>
  <script type="text/babel" src="./app.js"></script>
  

</body>
</html>
